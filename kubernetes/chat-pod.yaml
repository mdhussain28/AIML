apiVersion: v1
kind: Pod
metadata:
  name: chat-pod
  labels:
    app: chat-api
spec:
  containers:
  - name: chat-api
    image: python:3.11-slim
    command: ["sh", "-c"]
    args:
    - |
      pip install fastapi uvicorn requests -q
      mkdir -p /app
      cat <<EOF > /app/main.py
      from fastapi import FastAPI
      import requests, os
      app = FastAPI()
      RISK_URL = os.getenv("RISK_API_URL", "http://risk-service:8001")

      @app.get("/chat")
      def chat(message: str = "hello"):
          reply = f"Support bot received: {message}"
          try:
              risk = requests.get(f"{RISK_URL}/risk", params={"message": message}, timeout=3).json()
          except:
              risk = {"risk_score": "unavailable", "flag": "unknown"}
          return {
              "reply": reply,
              "risk_score": risk.get("risk_score"),
              "flag": risk.get("flag")
          }
      @app.get("/health")
      def health():
          return {"status": "ok"}
      EOF
      cd /app && uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
    - containerPort: 8000
    env:
    - name: RISK_API_URL
      value: "http://risk-service:8001"
