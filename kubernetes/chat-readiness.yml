apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
        - |
          pip install fastapi uvicorn requests -q
          mkdir -p /app
          cat <<EOF > /app/main.py
          from fastapi import FastAPI
          import socket, time

          app = FastAPI()
          START = time.time()

          @app.get("/chat")
          def chat(message: str = "hello"):
              return {
                  "reply": f"Support bot received: {message}",
                  "served_by": socket.gethostname()
              }

          @app.get("/health")
          def health():
              return {"status": "ok", "pod": socket.gethostname()}
          EOF
          sleep 10
          cd /app && uvicorn main:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
