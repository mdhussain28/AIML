apiVersion: v1
kind: Pod
metadata:
  name: chat-pod
spec:
  containers:
  - name: chat-api
    image: python:3.11-slim
    command: ["sh", "-c"]
    args:
    - |
      pip install fastapi uvicorn -q
      cat <<EOF > /app/main.py
      from fastapi import FastAPI
      import datetime, os

      app = FastAPI()

      @app.get("/chat")
      def chat(message: str = "hello"):
          log_line = f"{datetime.datetime.now()} | message={message}\n"
          os.makedirs("/app/logs", exist_ok=True)
          with open("/app/logs/chat.log", "a") as f:
              f.write(log_line)
          return {"reply": f"Support bot received: {message}", "status": "ok"}
      EOF
      cd /app && uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
    - containerPort: 8000
    volumeMounts:
    - name: log-volume
      mountPath: /app/logs

  - name: log-forwarder
    image: busybox
    command: ["sh", "-c"]
    args:
    - |
      echo "Waiting for log file..."
      until [ -f /logs/chat.log ]; do
        sleep 2
      done
      echo "Log file found, starting tail..."
      tail -f /logs/chat.log
    volumeMounts:
    - name: log-volume
      mountPath: /logs

  volumes:
  - name: log-volume
    emptyDir: {}
