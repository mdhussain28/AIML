apiVersion: v1
kind: Pod
metadata:
  name: risk-pod
spec:
  containers:
  - name: risk-api
    image: python:3.11-slim
    command: ["sh", "-c"]
    args:
    - |
      pip install fastapi uvicorn scikit-learn -q
      cat <<EOF > /app/risk.py
      from fastapi import FastAPI
      import random, datetime, os

      app = FastAPI()

      @app.get("/risk")
      def score(message: str = ""):
          # Simulate ML scoring
          keywords = ["lost", "stolen", "fraud", "unauthorized", "blocked"]
          score = round(min(0.95, sum(0.2 for k in keywords if k in message.lower()) + random.uniform(0.1, 0.3)), 2)
          flag = "high_risk" if score > 0.6 else "low_risk"
          result = f"{datetime.datetime.now()} | score={score} flag={flag}\n"
          os.makedirs("/app/metrics", exist_ok=True)
          with open("/app/metrics/scores.log", "a") as f:
              f.write(result)
          return {"risk_score": score, "flag": flag}
      EOF
      cd /app && uvicorn risk:app --host 0.0.0.0 --port 8001
    ports:
    - containerPort: 8001
    volumeMounts:
    - name: metrics-volume
      mountPath: /app/metrics

  - name: metrics-reporter
    image: busybox
    command: ["sh", "-c"]
    args:
    - |
      while true; do
        echo "=== Risk Scores at $(date) ==="
        cat /metrics/scores.log 2>/dev/null || echo "No scores yet"
        sleep 10
      done
    volumeMounts:
    - name: metrics-volume
      mountPath: /metrics

  volumes:
  - name: metrics-volume
    emptyDir: {}
