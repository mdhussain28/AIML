apiVersion: v1
kind: Service
metadata:
  name: risk-service
spec:
  type: ClusterIP
  selector:
    app: risk-api
  ports:
  - port: 8001
    targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
spec:
  type: NodePort
  selector:
    app: chat-api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080
