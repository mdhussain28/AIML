apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: python:3.11-slim
        command: ['sh', '-c']
        args:
        - |
          pip install fastapi uvicorn requests -q
          mkdir -p /app
          cat <<PYEOF > /app/main.py
          from fastapi import FastAPI
          import requests, socket, os
          app = FastAPI()
          PROMPT   = os.getenv('SYSTEM_PROMPT', 'You are a helpful assistant.')
          RISK_URL = os.getenv('RISK_API_URL', 'http://risk-service:8001')
          BOT      = os.getenv('BOT_NAME', 'Bot')
          ENV      = os.getenv('APP_ENV', 'dev')
          MAX_LEN  = int(os.getenv('MAX_MESSAGE_LENGTH', '500'))
          LLM_KEY  = os.getenv('LLM_API_KEY', 'not-set')
          @app.get('/chat')
          def chat(message: str = 'hello'):
              if len(message) > MAX_LEN:
                  return {'error': f'Message too long. Max {MAX_LEN} chars.'}
              reply = f'[{BOT}] {PROMPT} | You said: {message}'
              try:
                  risk = requests.get(f'{RISK_URL}/risk', params={'message': message}, timeout=3).json()
              except:
                  risk = {'risk_score': 'unavailable', 'flag': 'unknown'}
              return {'reply': reply, 'risk_score': risk.get('risk_score'),
                      'flag': risk.get('flag'), 'env': ENV,
                      'api_key_set': LLM_KEY != 'not-set', 'served_by': socket.gethostname()}
          @app.get('/health')
          def health(): return {'status': 'ok', 'bot': BOT, 'env': ENV}
          @app.get('/config')
          def config(): return {'bot': BOT, 'env': ENV, 'prompt': PROMPT,
                                'risk_url': RISK_URL, 'max_len': MAX_LEN,
                                'llm_key_set': LLM_KEY != 'not-set'}
          PYEOF
          cd /app && uvicorn main:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: '100m'
            memory: '128Mi'
          limits:
            cpu: '200m'
            memory: '256Mi'
        envFrom:
        # Inject ALL ConfigMap keys as env vars at once
        - configMapRef:
            name: chat-config
        env:
        # Inject specific Secret keys only
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: chat-llm-secret
              key: LLM_API_KEY
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_PASSWORD
        volumeMounts:
        - name: prompt-volume
          mountPath: /config
      volumes:
      - name: prompt-volume
        configMap:
          name: chat-prompt-config
