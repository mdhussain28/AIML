apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-api
  template:
    metadata:
      labels:
        app: risk-api
    spec:
      containers:
      - name: risk-api
        image: python:3.11-slim
        command: ['sh', '-c']
        args:
        - |
          pip install fastapi uvicorn -q
          mkdir -p /app
          cat <<PYEOF > /app/risk.py
          from fastapi import FastAPI
          import random, socket, os
          app = FastAPI()
          DB_USER = os.getenv('DB_USERNAME', 'not-set')
          APP_ENV = os.getenv('APP_ENV', 'dev')
          @app.get('/risk')
          def score(message: str = ''):
              keywords = ['lost','stolen','fraud','unauthorized']
              score = round(min(0.95, sum(0.2 for k in keywords if k in message.lower()) + random.uniform(0.1,0.3)),2)
              return {'risk_score': score, 'flag': 'high_risk' if score > 0.6 else 'low_risk',
                      'served_by': socket.gethostname(), 'env': APP_ENV, 'db_user': DB_USER}
          @app.get('/health')
          def health(): return {'status': 'ok', 'env': APP_ENV}
          PYEOF
          cd /app && uvicorn risk:app --host 0.0.0.0 --port 8001
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: '100m'
            memory: '128Mi'
          limits:
            cpu: '200m'
            memory: '256Mi'
        env:
        # --- From ConfigMap ---
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: chat-config
              key: APP_ENV
        # --- From Secret ---
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_PASSWORD
