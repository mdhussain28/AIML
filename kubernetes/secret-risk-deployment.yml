apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-api
  template:
    metadata:
      labels:
        app: risk-api
    spec:
      containers:
      - name: risk-api
        image: hussain2844/risk
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        env:
        # --- From ConfigMap ---
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: chat-config
              key: APP_ENV
        # --- From Secret ---
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chat-db-creds
              key: DB_PASSWORD
