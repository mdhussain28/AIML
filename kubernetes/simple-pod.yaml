apiVersion: v1
kind: Pod
metadata:
  name: chat-simple
spec:
  containers:
  - name: chat-api
    image: python:3.11-slim
    command: ["sh", "-c"]
    args:
    - |
      pip install fastapi uvicorn -q
      mkdir -p /app
      cat <<EOF > /app/main.py
      from fastapi import FastAPI
      app = FastAPI()

      @app.get("/chat")
      def chat(message: str = "hello"):
          return {"reply": f"Support bot received: {message}"}
      EOF
      cd /app && uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
    - containerPort: 8000
