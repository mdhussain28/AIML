apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-app
  labels:
    app: ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-app
  template:
    metadata:
      labels:
        app: ai-app
    spec:
      containers:
      - name: chat-api
        image: hussain2844/chat-api:v1
        ports:
        - containerPort: 8000
        env:
        - name: RISK_API_URL
          value: "http://localhost:8001" 
        - name: LOG_DIR
          value: "/shared/logs"
        - name: MODEL_DIR
          value: "/model"
        - name: BOT_NAME
          value: "BankBot"
        - name: APP_ENV
          value: "production"
        volumeMounts:
        - name: shared-logs
          mountPath: /shared/logs
        - name: model-storage
          mountPath: /model
      - name: risk-api
        image: hussain2844/risk-api:v1
        ports:
        - containerPort: 8001
        env:
        - name: LOG_DIR
          value: "/shared/logs"
        - name: MODEL_DIR
          value: "/model"
        - name: APP_ENV
          value: "production"
        volumeMounts:
        - name: shared-logs
          mountPath: /shared/logs
        - name: model-storage
          mountPath: /model
      - name: log-reader
        image: busybox
        command: ["sh", "-c"]
        args:
        - |
          while true; do
            echo "=== Chat Logs ===" && cat /logs/chat.log 2>/dev/null || echo "no chat logs yet"
            echo "=== Risk Logs ===" && cat /logs/risk.log 2>/dev/null || echo "no risk logs yet"
            sleep 10
          done
        volumeMounts:
        - name: shared-logs
          mountPath: /logs
      volumes:
      - name: shared-logs
        emptyDir: {}
      - name: model-storage
        emptyDir: {}
