version: "3.9"
services:
  api:
    build: ./api
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=reviewsdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-network
    restart: on-failure
  # ── SERVICE 2: Redis Cache ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentiment-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-network
    restart: unless-stopped
  # ── SERVICE 3: PostgreSQL Database ──────────────
  postgres:
    image: postgres:15-alpine
    container_name: sentiment-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=reviewsdb
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d reviewsdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ai-network
    restart: unless-stopped
# ── VOLUMES ───────────────────────────────────────
volumes:
  redis-data:
  postgres-data:
# ── NETWORK ───────────────────────────────────────
networks:
  ai-network:
    driver: bridge
